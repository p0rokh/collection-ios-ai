<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Ash explosion demo</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
    padding: 16px;
  }
  .wrap { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 18px; margin: 0 0 12px; }
  canvas {
    display: block;
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    width: 100%;
    height: 500px;
  }
  .controls {
    margin-top: 16px;
    padding: 16px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 24px;
  }
  .row { display: flex; align-items: center; gap: 8px; }
  .row label { flex: 0 0 130px; font-size: 13px; }
  .row input[type=range] { flex: 1; }
  .row .val { flex: 0 0 70px; text-align: right; font-variant-numeric: tabular-nums; font-size: 13px; color: #6e6e73; }
  .btns { grid-column: 1 / -1; display: flex; gap: 8px; margin-top: 4px; }
  button {
    background: #007aff;
    color: white;
    border: 0;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
  }
  button.secondary { background: #e5e5ea; color: #1d1d1f; }
  .check { display: flex; align-items: center; gap: 8px; font-size: 13px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Демка пепла 🪶 — ячейка распадается, пиксели всплывают и тают</h1>
  <canvas id="stage"></canvas>
  <div class="controls">
    <div class="row">
      <label>Размер осколка</label>
      <input id="chunk" type="range" min="1" max="12" value="1" step="1">
      <span class="val" id="chunkVal">1pt</span>
    </div>
    <div class="row">
      <label>Скорость разлёта</label>
      <input id="speed" type="range" min="0" max="300" value="60" step="10">
      <span class="val" id="speedVal">60</span>
    </div>
    <div class="row">
      <label>Гравитация (− вверх)</label>
      <input id="gravity" type="range" min="-1200" max="0" value="-50" step="10">
      <span class="val" id="gravityVal">-50</span>
    </div>
    <div class="row">
      <label>Сопротивление</label>
      <input id="damping" type="range" min="900" max="1000" value="985" step="1">
      <span class="val" id="dampingVal">0.985</span>
    </div>
    <div class="row">
      <label>Импульс вверх</label>
      <input id="upbias" type="range" min="0" max="400" value="50" step="10">
      <span class="val" id="upbiasVal">50</span>
    </div>
    <div class="row">
      <label>Wobble сила X</label>
      <input id="wobbleAmp" type="range" min="0" max="1500" value="300" step="50">
      <span class="val" id="wobbleAmpVal">300</span>
    </div>
    <div class="row">
      <label>Wobble частота</label>
      <input id="wobbleFreq" type="range" min="10" max="200" value="85" step="5">
      <span class="val" id="wobbleFreqVal">0.85Hz</span>
    </div>
    <div class="row">
      <label>Lifetime мин</label>
      <input id="lifeMin" type="range" min="50" max="2000" value="100" step="50">
      <span class="val" id="lifeMinVal">0.1s</span>
    </div>
    <div class="row">
      <label>Lifetime макс</label>
      <input id="lifeMax" type="range" min="50" max="3000" value="800" step="50">
      <span class="val" id="lifeMaxVal">0.8s</span>
    </div>
    <div class="row">
      <label>Порог взрыва</label>
      <input id="threshold" type="range" min="4" max="40" value="12" step="2">
      <span class="val" id="thresholdVal">12pt</span>
    </div>
    <div class="row">
      <label>Collapse длительность</label>
      <input id="collapseDur" type="range" min="100" max="1000" value="300" step="50">
      <span class="val" id="collapseDurVal">300ms</span>
    </div>
    <div class="row">
      <label>Кривая collapse</label>
      <select id="easing">
        <option value="linear">linear</option>
        <option value="easeOut">easeOut</option>
        <option value="easeIn" selected>easeIn</option>
        <option value="easeInOut">easeInOut</option>
      </select>
    </div>
    <div class="check">
      <input id="rotate" type="checkbox" checked>
      <label for="rotate">Вращение осколков</label>
    </div>
    <div class="btns">
      <button id="play">▶ Play</button>
      <button id="reset" class="secondary">Reset</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');

const cfg = {
  chunk: 1, speed: 60, gravity: -50, damping: 0.985,
  upbias: 50, wobbleAmp: 300, wobbleFreq: 0.85,
  lifeMin: 0.1, lifeMax: 0.8,
  threshold: 12, collapseDur: 300, easing: 'easeIn',
  rotate: true
};

function bindRange(id, transform = v => v) {
  const el = document.getElementById(id);
  const valEl = document.getElementById(id + 'Val');
  el.addEventListener('input', () => {
    const v = transform(+el.value);
    cfg[id] = v;
    if (id === 'damping') valEl.textContent = v.toFixed(3);
    else if (id === 'collapseDur') valEl.textContent = v + 'ms';
    else if (id === 'chunk' || id === 'threshold') valEl.textContent = v + 'pt';
    else if (id === 'wobbleAmp') valEl.textContent = v;
    else if (id === 'wobbleFreq') valEl.textContent = v.toFixed(2) + 'Hz';
    else if (id === 'lifeMin' || id === 'lifeMax') valEl.textContent = v.toFixed(1) + 's';
    else valEl.textContent = v;
  });
}
bindRange('chunk');
bindRange('speed');
bindRange('gravity');
bindRange('damping', v => v / 1000);
bindRange('upbias');
bindRange('wobbleAmp');
bindRange('wobbleFreq', v => v / 100);
bindRange('lifeMin', v => v / 1000);
bindRange('lifeMax', v => v / 1000);
bindRange('threshold');
bindRange('collapseDur');
document.getElementById('easing').addEventListener('change', e => cfg.easing = e.target.value);
document.getElementById('rotate').addEventListener('change', e => cfg.rotate = e.target.checked);

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', () => { resize(); draw(); });
resize();

const bubble = {
  x: 0, y: 0, w: 280, h: 70,
  fullH: 70,
  text: 'О, надо глянуть на выходных',
  date: '22:33',
  color: '#007aff'
};

function placeBubble() {
  const rect = canvas.getBoundingClientRect();
  bubble.x = rect.width / 2 - bubble.w / 2;
  bubble.y = rect.height - 140;
}
placeBubble();

let state = 'idle';
let collapseStart = 0;
let particles = [];
let bubbleImageData = null;

function ease(t, kind) {
  if (kind === 'linear') return t;
  if (kind === 'easeOut') return 1 - Math.pow(1 - t, 2);
  if (kind === 'easeIn') return t * t;
  if (kind === 'easeInOut') return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2;
  return t;
}

function roundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, h/2, w/2);
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

function renderBubbleToCanvas(targetCtx, x, y, w, h) {
  targetCtx.save();
  roundRect(targetCtx, x, y, w, h, Math.min(16, h/2));
  targetCtx.fillStyle = bubble.color;
  targetCtx.fill();
  targetCtx.clip();
  if (h > 20) {
    targetCtx.fillStyle = 'white';
    targetCtx.font = '15px -apple-system, sans-serif';
    targetCtx.fillText(bubble.text, x + 14, y + 28);
    targetCtx.font = '11px -apple-system, sans-serif';
    targetCtx.fillStyle = 'rgba(255,255,255,0.8)';
    targetCtx.fillText(bubble.date, x + w - 36, y + h - 10);
  }
  targetCtx.restore();
}

function snapshotBubble() {
  const off = document.createElement('canvas');
  off.width = bubble.w;
  off.height = bubble.fullH;
  const octx = off.getContext('2d');
  renderBubbleToCanvas(octx, 0, 0, bubble.w, bubble.fullH);
  bubbleImageData = octx.getImageData(0, 0, bubble.w, bubble.fullH);
}

function explode() {
  if (!bubbleImageData) snapshotBubble();
  particles = [];
  // Crop to visible portion: bottom cfg.threshold pixels of bubble
  const chunk = cfg.chunk;
  const data = bubbleImageData.data;
  const iw = bubbleImageData.width;
  const ih = bubbleImageData.height;
  const cropH = Math.min(cfg.threshold, ih);
  const cropStartY = ih - cropH;

  for (let py = cropStartY; py < ih; py += chunk) {
    for (let px = 0; px < iw; px += chunk) {
      const cx = Math.min(px + Math.floor(chunk/2), iw-1);
      const cy = Math.min(py + Math.floor(chunk/2), ih-1);
      const i = (cy * iw + cx) * 4;
      const a = data[i+3];
      if (a < 30) continue;
      const jitter = 20;
      const r = Math.max(0, Math.min(255, data[i] + (Math.random() * 2 - 1) * jitter));
      const g = Math.max(0, Math.min(255, data[i+1] + (Math.random() * 2 - 1) * jitter));
      const b = Math.max(0, Math.min(255, data[i+2] + (Math.random() * 2 - 1) * jitter));
      const ang = Math.random() * Math.PI * 2;
      const sp = cfg.speed * (0.5 + Math.random() * 0.8);
      const lifetime = cfg.lifeMin + Math.random() * (cfg.lifeMax - cfg.lifeMin);
      // Particles emerge from cell's current visible 12pt area at bottom of original bubble position
      particles.push({
        x: bubble.x + px + chunk/2,
        y: bubble.y + (bubble.fullH - cropH) + (py - cropStartY) + chunk/2,
        vx: Math.cos(ang) * sp,
        vy: Math.sin(ang) * sp - cfg.upbias * (0.5 + Math.random()*0.5),
        size: chunk,
        color: `rgba(${r},${g},${b},${a/255})`,
        rot: 0,
        vrot: (Math.random() - 0.5) * 12,
        alpha: 1,
        alphaDecay: 1.0 / lifetime,
        wAmpX: cfg.wobbleAmp * (0.4 + Math.random() * 1.2),
        wAmpY: cfg.wobbleAmp * 0.3 * (0.4 + Math.random()),
        wFreqX: cfg.wobbleFreq * (0.5 + Math.random()),
        wFreqY: cfg.wobbleFreq * (0.5 + Math.random()),
        wPhaseX: Math.random() * Math.PI * 2,
        wPhaseY: Math.random() * Math.PI * 2,
        age: 0
      });
    }
  }
}

function draw() {
  const rect = canvas.getBoundingClientRect();
  ctx.clearRect(0, 0, rect.width, rect.height);
  ctx.fillStyle = '#f0f0f5';
  ctx.fillRect(0, 0, rect.width, rect.height);
  ctx.fillStyle = 'white';
  ctx.fillRect(20, 20, rect.width - 40, rect.height - 40);

  if (state === 'idle' || state === 'shrinking') {
    let h = bubble.h;
    if (state === 'shrinking') {
      const t = Math.min(1, (performance.now() - collapseStart) / cfg.collapseDur);
      const e = ease(t, cfg.easing);
      const targetH = cfg.threshold;
      h = bubble.fullH * (1 - e) + targetH * e;
      if (h <= cfg.threshold + 0.5) {
        state = 'exploded';
        explode();
      }
    }
    if (state !== 'exploded') {
      // Anchor at bottom (bubble.y is its top originally)
      const drawY = bubble.y + (bubble.fullH - h);
      renderBubbleToCanvas(ctx, bubble.x, drawY, bubble.w, h);
    }
  }

  if (state === 'exploded') {
    const dt = 1/60;
    for (const p of particles) {
      p.age += dt;
      const ax = Math.sin(p.age * p.wFreqX * Math.PI * 2 + p.wPhaseX) * p.wAmpX;
      const ay = Math.sin(p.age * p.wFreqY * Math.PI * 2 + p.wPhaseY) * p.wAmpY;
      p.vx += ax * dt;
      p.vy += (ay + cfg.gravity) * dt;
      p.vx *= cfg.damping;
      p.vy *= cfg.damping;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      if (cfg.rotate) p.rot += p.vrot * dt;
      p.alpha = Math.max(0, p.alpha - p.alphaDecay * dt);
    }
    particles = particles.filter(p => p.y > -50 && p.y < rect.height + 50 && p.alpha > 0.02);

    ctx.save();
    for (const p of particles) {
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      if (cfg.rotate) {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
        ctx.restore();
      } else {
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
      }
    }
    ctx.restore();
  }
}

function loop() {
  draw();
  if (state !== 'idle') {
    requestAnimationFrame(loop);
  }
}

document.getElementById('play').addEventListener('click', () => {
  if (state !== 'idle') return;
  bubble.h = bubble.fullH;
  snapshotBubble();
  state = 'shrinking';
  collapseStart = performance.now();
  requestAnimationFrame(loop);
});

document.getElementById('reset').addEventListener('click', () => {
  state = 'idle';
  particles = [];
  bubble.h = bubble.fullH;
  placeBubble();
  draw();
});

draw();
</script>
</body>
</html>
